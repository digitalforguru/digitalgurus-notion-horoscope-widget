<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DigitalGuru Horoscope Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- 🌸 BUILDER UI -->
<div class="builder-ui">

  <h1 class="header">DigitalGuru Horoscope Widget</h1>

  <!-- controls row -->
  <div class="controls">

    <!-- sign -->
    <button id="signBtn" class="btn">♈ sign</button>
    <div id="signPanel" class="panel hidden">
      <button data-sign="aries">aries</button>
      <button data-sign="taurus">taurus</button>
      <button data-sign="gemini">gemini</button>
      <button data-sign="cancer">cancer</button>
      <button data-sign="leo">leo</button>
      <button data-sign="virgo">virgo</button>
      <button data-sign="libra">libra</button>
      <button data-sign="scorpio">scorpio</button>
      <button data-sign="sagittarius">sagittarius</button>
      <button data-sign="capricorn">capricorn</button>
      <button data-sign="aquarius">aquarius</button>
      <button data-sign="pisces">pisces</button>
    </div>

    <!-- theme -->
    <button id="themeBtn" class="btn">🎨 theme</button>
    <div id="themePanel" class="panel hidden">
      <button data-theme="#ffdbe7"></button>
      <button data-theme="#c1d0b5"></button>
      <button data-theme="#d6e8ff"></button>
      <button data-theme="#e7e3dc"></button>
    </div>

  </div>

  <!-- copy link -->
  <button id="copyBtn" class="copy">copy embed link</button>

</div>

<!-- 🌌 WIDGET -->
<div id="widget" class="widget">

  <div class="top">
    <div id="signDisplay">aries</div>
  </div>

  <div id="text">loading stars…</div>
  <div id="date"></div>

</div>

<script src="script.js"></script>
</body>
</html>
